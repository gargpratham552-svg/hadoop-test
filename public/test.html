<!DOCTYPE html>
<html>

    body {
      font-family: Arial;
      background: #f5f7fa;
      margin: 0;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;

    .question {
      background: white;

    button {
      padding: 12px 20px;

      color: white;

      cursor: pointer;
      display: block;
      margin: 20px auto;
    }
  </style>
</head>

<body>
<h3 id="timer" style="text-align:right; color:red;">30:00</h3>

</html>
