<!DOCTYPE html>
<html>
<head>
  <title>Hadoop Test</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Hadoop Test</h2>

    <input id="name" placeholder="Name">
    <input id="roll" placeholder="Roll No">
    <input id="phone" placeholder="Phone">

    <button onclick="startTest()">Start Test</button>
  </div>

<script>
function startTest(){
  let data = {
    name: name.value,
    roll: roll.value,
    phone: phone.value
  };

  localStorage.setItem("student", JSON.stringify(data));
  window.location = "test.html";
}
</script>

</body>
</html>
